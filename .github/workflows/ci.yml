name: Optimized CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [
          "auth-service",
          "catalog-service",
          "frontend",
          "gateway",
          "loan-service",
          "notification-service",
          "parameter-service",
          "reader-service",
          "report-service"
        ]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './${{ matrix.service }}/package-lock.json'

      - name: Install dependencies
        run: |
          cd ${{ matrix.service }}
          npm install

      - name: Run Lint
        run: |
          cd ${{ matrix.service }}
          npm run lint

  sonarcloud-analysis:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      
      - name: SonarCloud Scan
        uses: sonarsource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Needed to get PR information, if any
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  security-scan-and-build:
    needs: sonarcloud-analysis
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [
          { name: "auth-service", image: "library-auth-service" },
          { name: "catalog-service", image: "library-catalog-service" },
          { name: "frontend", image: "library-frontend" },
          { name: "gateway", image: "library-gateway" },
          { name: "loan-service", image: "library-loan-service" },
          { name: "notification-service", image: "library-notification-service" },
          { name: "parameter-service", image: "library-parameter-service" },
          { name: "reader-service", image: "library-reader-service" },
          { name: "report-service", image: "library-report-service" }
        ]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service.name }}
          file: ./${{ matrix.service.name }}/Dockerfile
          push: false
          load: true
          tags: ${{ matrix.service.image }}:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ matrix.service.image }}:test'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '1' # Fail the build on critical/high vulnerabilities
          ignore-unfixed: true

      - name: Login to Docker Hub
        # Only login/push on main branch push
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Docker image
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service.name }}
          file: ./${{ matrix.service.name }}/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.service.image }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.service.image }}:${{ github.sha }}
