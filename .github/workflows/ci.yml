name: 🚀 Production CI Pipeline

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

env:
  NODE_VERSION: 20

jobs:

# ==========================================
# 1. LINT
# ==========================================
  lint:
    name: 🔍 Lint — ${{ matrix.service }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - catalog-service
          - frontend
          - gateway
          - loan-service
          - notification-service
          - parameter-service
          - reader-service
          - report-service

    steps:
      - name: 📥 Checkout source code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ./${{ matrix.service }}/package-lock.json

      - name: 📦 Install dependencies
        working-directory: ${{ matrix.service }}
        run: npm ci

      - name: 🔍 Run ESLint
        working-directory: ${{ matrix.service }}
        run: npm run lint || true

# ==========================================
# 2. TEST & COVERAGE
# ==========================================
  test:
    name: 🧪 Test — ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - catalog-service
          - frontend
          - gateway
          - loan-service
          - notification-service
          - parameter-service
          - reader-service
          - report-service

    steps:
      - name: 📥 Checkout source code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ./${{ matrix.service }}/package-lock.json

      - name: 📦 Install dependencies
        working-directory: ${{ matrix.service }}
        run: npm ci

      - name: 🧪 Run unit tests
        working-directory: ${{ matrix.service }}
        run: npm test -- --passWithNoTests 2>/dev/null || echo "No test runner configured, skipping..."
        continue-on-error: true

      - name: 📤 Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.service }}
          path: ${{ matrix.service }}/coverage
          if-no-files-found: ignore

# ==========================================
# 3. SONARCLOUD ANALYSIS
# ==========================================
  sonar:
    name: 📊 SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: 📥 Checkout full git history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 📥 Download all coverage reports
        uses: actions/download-artifact@v4
        with:
          path: coverage
          pattern: coverage-*
          merge-multiple: true

      - name: 🔍 Run SonarCloud scan
        uses: sonarsource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=Lghthien_library-website-microservice
            -Dsonar.organization=lghthien
            -Dsonar.sources=.
            -Dsonar.exclusions=**/node_modules/**,**/dist/**,**/.next/**,**/*.spec.ts,**/*.test.ts

# ==========================================
# 4. BUILD DOCKER IMAGE
# ==========================================
  build:
    name: 🐳 Build — ${{ matrix.service.name }}
    runs-on: ubuntu-latest
    needs: sonar

    strategy:
      fail-fast: false
      matrix:
        service:
          - { name: "auth-service",          image: "library-auth-service"          }
          - { name: "catalog-service",        image: "library-catalog-service"        }
          - { name: "frontend",               image: "library-frontend"               }
          - { name: "gateway",                image: "library-gateway"                }
          - { name: "loan-service",           image: "library-loan-service"           }
          - { name: "notification-service",   image: "library-notification-service"   }
          - { name: "parameter-service",      image: "library-parameter-service"      }
          - { name: "reader-service",         image: "library-reader-service"         }
          - { name: "report-service",         image: "library-report-service"         }

    steps:
      - name: 📥 Checkout source code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🐳 Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service.name }}
          file: ./${{ matrix.service.name }}/Dockerfile
          push: false
          load: true
          tags: ${{ matrix.service.image }}:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

# ==========================================
# 5. SECURITY SCAN (TRIVY)
# ==========================================
  security:
    name: 🔐 Security Scan — ${{ matrix.service.name }}
    runs-on: ubuntu-latest
    needs: build

    strategy:
      fail-fast: false
      matrix:
        service:
          - { name: "auth-service",          image: "library-auth-service"          }
          - { name: "catalog-service",        image: "library-catalog-service"        }
          - { name: "frontend",               image: "library-frontend"               }
          - { name: "gateway",                image: "library-gateway"                }
          - { name: "loan-service",           image: "library-loan-service"           }
          - { name: "notification-service",   image: "library-notification-service"   }
          - { name: "parameter-service",      image: "library-parameter-service"      }
          - { name: "reader-service",         image: "library-reader-service"         }
          - { name: "report-service",         image: "library-report-service"         }

    steps:
      - name: 📥 Checkout source code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🐳 Rebuild image for scan
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service.name }}
          file: ./${{ matrix.service.name }}/Dockerfile
          push: false
          load: true
          tags: ${{ matrix.service.image }}:test
          cache-from: type=gha

      - name: 🔐 Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ matrix.service.image }}:test
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          skip-dirs: /usr/local/lib/node_modules/npm,/opt/yarn-v1.22.22

# ==========================================
# 6. PUSH TO DOCKER HUB (ONLY main/master)
# ==========================================
  push:
    name: 🚀 Push — ${{ matrix.service.name }}
    runs-on: ubuntu-latest
    needs: security

    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && github.event_name == 'push'

    strategy:
      matrix:
        service:
          - { name: "auth-service",          image: "library-auth-service"          }
          - { name: "catalog-service",        image: "library-catalog-service"        }
          - { name: "frontend",               image: "library-frontend"               }
          - { name: "gateway",                image: "library-gateway"                }
          - { name: "loan-service",           image: "library-loan-service"           }
          - { name: "notification-service",   image: "library-notification-service"   }
          - { name: "parameter-service",      image: "library-parameter-service"      }
          - { name: "reader-service",         image: "library-reader-service"         }
          - { name: "report-service",         image: "library-report-service"         }

    steps:
      - name: 📥 Checkout source code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🚀 Build & Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service.name }}
          file: ./${{ matrix.service.name }}/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.service.image }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.service.image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max