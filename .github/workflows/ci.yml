name: 🚀 Production CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  NODE_VERSION: 20

jobs:

# ==========================================
# 1. LINT + TEST + COVERAGE
# ==========================================
  test:
    name: 🧪 Lint & Test
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        service: [
          "auth-service",
          "catalog-service",
          "frontend",
          "gateway",
          "loan-service",
          "notification-service",
          "parameter-service",
          "reader-service",
          "report-service"
        ]

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ./${{ matrix.service }}/package-lock.json

      - name: 📦 Install dependencies (CI mode)
        working-directory: ${{ matrix.service }}
        run: npm ci

      - name: 🔍 Lint (fix ESLint v9 issue)
        working-directory: ${{ matrix.service }}
        run: |
          npx eslint . --ext .ts || exit 1

      - name: 🧪 Run Tests + Coverage
        working-directory: ${{ matrix.service }}
        run: |
          npm test -- --coverage

      - name: 📤 Upload Coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.service }}
          path: ${{ matrix.service }}/coverage

# ==========================================
# 2. SONAR CLOUD ANALYSIS
# ==========================================
  sonar:
    name: 📊 SonarCloud Analysis
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 📥 Download Coverage
        uses: actions/download-artifact@v4
        with:
          path: coverage

      - name: 🔍 Run SonarCloud Scan
        uses: sonarsource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=library-management
            -Dsonar.organization=your-org
            -Dsonar.sources=.
            -Dsonar.javascript.lcov.reportPaths=coverage/**/lcov.info
            -Dsonar.exclusions=**/node_modules/**,**/dist/**,**/.next/**

# ==========================================
# 3. BUILD + SECURITY SCAN
# ==========================================
  build:
    name: 🐳 Build & Security Scan
    needs: sonar
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        service: [
          { name: "auth-service", image: "library-auth-service" },
          { name: "catalog-service", image: "library-catalog-service" },
          { name: "frontend", image: "library-frontend" },
          { name: "gateway", image: "library-gateway" },
          { name: "loan-service", image: "library-loan-service" },
          { name: "notification-service", image: "library-notification-service" },
          { name: "parameter-service", image: "library-parameter-service" },
          { name: "reader-service", image: "library-reader-service" },
          { name: "report-service", image: "library-report-service" }
        ]

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🐳 Build Docker Image (cached)
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service.name }}
          file: ./${{ matrix.service.name }}/Dockerfile
          push: false
          load: true
          tags: ${{ matrix.service.image }}:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 🔐 Security Scan (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ matrix.service.image }}:test
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true

# ==========================================
# 4. PUSH DOCKER (ONLY MAIN)
# ==========================================
  push:
    name: 🚀 Push Docker Images
    needs: build
    runs-on: ubuntu-latest

    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    strategy:
      matrix:
        service: [
          { name: "auth-service", image: "library-auth-service" },
          { name: "catalog-service", image: "library-catalog-service" },
          { name: "frontend", image: "library-frontend" },
          { name: "gateway", image: "library-gateway" },
          { name: "loan-service", image: "library-loan-service" },
          { name: "notification-service", image: "library-notification-service" },
          { name: "parameter-service", image: "library-parameter-service" },
          { name: "reader-service", image: "library-reader-service" },
          { name: "report-service", image: "library-report-service" }
        ]

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔐 Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🚀 Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service.name }}
          file: ./${{ matrix.service.name }}/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.service.image }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.service.image }}:${{ github.sha }}